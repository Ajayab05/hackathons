name: Deploy to EKS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set ECR URL
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_URL=$ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com" >> $GITHUB_ENV

      - name: Build Images
        run: |
          docker build -t backend-app ./backend
          docker build -t frontend-app ./frontend

      - name: Tag & Push
        run: |
          docker tag backend-app:latest $ECR_URL/backend:latest
          docker push $ECR_URL/backend:latest

          docker tag frontend-app:latest $ECR_URL/frontend:latest
          docker push $ECR_URL/frontend:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name dev-eks --region ap-south-1
          kubectl apply -f k8s/

      # 🔥 IMPORTANT (ensures latest image is used)
      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment backend
          kubectl rollout restart deployment frontend
