name: Deploy to EKS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_URL }}

      - name: Build Images
        run: |
          docker build -t backend-app ./backend
          docker build -t frontend-app ./frontend

      - name: Tag & Push
        run: |
          docker tag backend-app:latest ${{ secrets.ECR_URL }}/backend-app:latest
          docker push ${{ secrets.ECR_URL }}/backend-app:latest

          docker tag frontend-app:latest ${{ secrets.ECR_URL }}/frontend-app:latest
          docker push ${{ secrets.ECR_URL }}/frontend-app:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name dev-eks --region ap-south-1
          kubectl apply -f k8s/
